name: Update Release Banner

on:
  repository_dispatch:
    types: [new_release]

jobs:
  update-banner:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOME_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update HTML with new release
        env:
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
          RELEASE_URL: ${{ github.event.client_payload.url }}
        run: node scripts/update_release.js

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update release banner to ${{ github.event.client_payload.version }}"
          file_pattern: index.html
